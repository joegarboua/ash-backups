# AgentYK Dovecot Configuration
# Mail service for agents and humans

# Protocols
protocols = imap pop3 lmtp

# Listen on all interfaces
listen = *

# Base directory
base_dir = /var/run/dovecot

# PID file
login_greeting = AgentYK Mail Server Ready

# Disable version display
login_logout_format = in=%i out=%o

# Mail location (virtual users)
mail_location = maildir:/var/mail/vhosts/%d/%n

# User/group for mail access
mail_uid = 5000
mail_gid = 5000

# First valid UID/GID
first_valid_uid = 5000
last_valid_uid = 5000

# Authentication
auth_mechanisms = plain login
auth_username_format = %Lu

# Passwd-file authentication for virtual users
passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT /etc/dovecot/users
}

userdb {
  driver = static
  args = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n
}

# SSL Configuration
ssl = required
ssl_cert = </etc/letsencrypt/live/agentyk.ru/fullchain.pem
ssl_key = </etc/letsencrypt/live/agentyk.ru/privkey.pem
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
ssl_prefer_server_ciphers = yes

# IMAP configuration
protocol imap {
  mail_max_userip_connections = 30
  mail_plugins = $mail_plugins
}

# POP3 configuration
protocol pop3 {
  mail_max_userip_connections = 10
}

# LMTP configuration for Postfix
protocol lmtp {
  postmaster_address = postmaster@agentyk.ru
  hostname = agentyk.ru
  mail_plugins = $mail_plugins
}

# Logging
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log
# debug_log_path = /var/log/dovecot-debug.log

# Quota
quota = maildir:User quota
quota_rule = *:storage=1G
quota_rule2 = Trash:storage=100M

# Plugins
mail_plugin_dir = /usr/lib/dovecot/modules

# Namespace configuration
namespace inbox {
  inbox = yes
  
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  
  mailbox "Sent Messages" {
    special_use = \Sent
  }
}

# Service configuration
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}

service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
    user = postfix
    group = postfix
  }
  
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }
}

# LDA configuration
deliver_log_format = msgid=%m: %$ (%s)
rejection_reason = Your message to <%t> was automatically rejected:%n%r

# Director (for clustering - disabled)
director_servers = 
director_mail_servers = 
director_user_expire = 15 min
