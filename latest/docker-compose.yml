services:

  # === AGENTYK PLATFORM ===
  agentyk:
    build: ./agentyk
    container_name: agentyk
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    expose:
      - "8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgres://agentyk:${POSTGRES_PASSWORD:-agentyk}@postgres:5432/agentyk?sslmode=disable
      - BTCPAY_URL=${BTCPAY_URL:-http://btcpay:49392}
      - BTCPAY_KEY=${BTCPAY_KEY}
      - BTCPAY_STORE_ID=${BTCPAY_STORE_ID}
      - BTCPAY_WEBHOOK_SECRET=${BTCPAY_WEBHOOK_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - STALWART_API=http://stalwart:8080
      - STALWART_ADMIN_USER=${STALWART_ADMIN_USER}
      - STALWART_ADMIN_PASS=${STALWART_ADMIN_PASS}
      - COUPON_SECRET=${COUPON_SECRET}
      - BTC_WALLET=${BTC_WALLET:-bc1qsjd5yf4uldmt8yjcdfffkldy78v5syp3d3n8hp}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: agentyk-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - POSTGRES_USER=agentyk
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agentyk}
      - POSTGRES_DB=agentyk
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentyk"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === NGINX REVERSE PROXY ===
  nginx:
    image: nginx:alpine
    container_name: ash-nginx
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html
      - ./docker/static:/static:ro
    depends_on:
      - agentyk
      - dashboard

  # === ASH DAEMONS (all share one image) ===
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.daemons
    image: ash-daemons:latest
    container_name: ash-dashboard
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "127.0.0.1:8080:8080"
      - "100.112.221.12:8080:8080"
    volumes:
      - .:/home/ash/ASH
    command: python3 /home/ash/ASH/dashboard/server.py

  btc-sentinel:
    image: ash-daemons:latest
    container_name: ash-btc-sentinel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - .:/home/ash/ASH
    environment:
      - BTC_WALLET=${BTC_WALLET:-bc1qsjd5yf4uldmt8yjcdfffkldy78v5syp3d3n8hp}
      - BTC_RPC_USER=${BTC_RPC_USER:-btcrpc}
      - BTC_RPC_PASS=${BTC_RPC_PASS}
      - BTCPAY_URL=http://btcpay:49392
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
    command: python3 /home/ash/ASH/daemon/btc-sentinel.py

  consciousness:
    image: ash-daemons:latest
    container_name: ash-consciousness
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - .:/home/ash/ASH
      - /home/ash/.local:/home/ash/.local:ro
      - /home/ash/.config:/home/ash/.config:ro
      - /home/ash/.claude:/home/ash/.claude
    command: python3 /home/ash/ASH/daemon/consciousness.py

  telegram-bot:
    image: ash-daemons:latest
    container_name: ash-telegram-bot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    volumes:
      - .:/home/ash/ASH
      - /home/ash/.local:/home/ash/.local:ro
      - /home/ash/.config:/home/ash/.config:ro
      - /home/ash/.claude:/home/ash/.claude
      - /home/ash/.codex:/home/ash/.codex
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: python3 /home/ash/ASH/telegram-bot.py

  autonomy:
    image: ash-daemons:latest
    container_name: ash-autonomy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    volumes:
      - .:/home/ash/ASH
      - /home/ash/.local:/home/ash/.local:ro
      - /home/ash/.config:/home/ash/.config:ro
      - /home/ash/.claude:/home/ash/.claude
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: bash /home/ash/ASH/daemon/autonomy.sh

  account-expiry:
    image: ash-daemons:latest
    container_name: ash-account-expiry
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - .:/home/ash/ASH
    environment:
      - DB_HOST=postgres
      - DB_USER=agentyk
      - DB_PASS=${POSTGRES_PASSWORD:-agentyk}
      - DB_NAME=agentyk
      - STALWART_API=http://stalwart:8080
      - STALWART_ADMIN_USER=${STALWART_ADMIN_USER}
      - STALWART_ADMIN_PASS=${STALWART_ADMIN_PASS}
      - SMTP_HOST=stalwart
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
    depends_on:
      - postgres
      - stalwart
    command: python3 /home/ash/ASH/daemon/account-expiry.py

  mailbox-cleanup:
    image: ash-daemons:latest
    container_name: ash-mailbox-cleanup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - .:/home/ash/ASH
    environment:
      - IMAP_HOST=stalwart
      - IMAP_PORT=993
      - STALWART_ADMIN_USER=${STALWART_ADMIN_USER}
      - STALWART_ADMIN_PASS=${STALWART_ADMIN_PASS}
      - STALWART_API=http://stalwart:8080
    depends_on:
      - stalwart
    command: python3 /home/ash/ASH/daemon/mailbox-cleanup.py

  # === LEARNING PIPELINE ===
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: ash-transmission
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9091/transmission/web/ || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - transmission-config:/config
      - downloads:/downloads

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: ash-jackett
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9117/UI/Dashboard || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:9117:9117"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - jackett-config:/config

  readarr:
    image: lscr.io/linuxserver/readarr:0.4.10-nightly
    container_name: ash-readarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8787/ping || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - readarr-config:/config
      - downloads:/downloads
    depends_on:
      - transmission
      - jackett

  # === BITCOIN PAYMENT STACK ===
  bitcoind:
    image: btcpayserver/bitcoin:30.2-amd64
    container_name: ash-bitcoind
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 1G
    environment:
      BITCOIN_NETWORK: mainnet
      BITCOIN_EXTRA_ARGS: |-
        rpcauth=btcrpc:9fe2c700ea14ff2ea39a222b930a8792$$3dd65c05680e381d4a8d6c7a83bde5a01e953b64a32a88cdac51a6b08a4b600b
        rpcauth=nbxplorer:4498028ece6ee4337e2f3ca64e0d90fb$$65b77b8ccf728e8d8cbcebf471f2c32ac56062ede2f374fe7ce4f7f0da4859fc
    command:
      - bitcoind
      - -printtoconsole
      - -prune=5000
      - -dbcache=50
      - -maxmempool=50
      - -maxconnections=16
      - -rpcallowip=172.16.0.0/12
      - -rpcbind=0.0.0.0
      - -server=1
      - -txindex=0
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8332 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 300s
    volumes:
      - bitcoin-data:/root/.bitcoin
    expose:
      - "8332"
      - "28332"
      - "28333"

  nbxplorer:
    image: nicolasdorier/nbxplorer:2.5.30
    container_name: ash-nbxplorer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      NBXPLORER_NETWORK: mainnet
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: ${NBXPLORER_BTCRPCURL:-http://100.71.230.36:8332/}
      NBXPLORER_BTCRPCUSER: ${NBXPLORER_BTCRPCUSER:-nbxplorer}
      NBXPLORER_BTCRPCPASSWORD: ${NBXPLORER_BTCRPCPASSWORD}
      NBXPLORER_BTCNODEENDPOINT: ${NBXPLORER_BTCNODEENDPOINT:-100.71.230.36:8333}
      NBXPLORER_POSTGRES: Host=postgres;Port=5432;Database=nbxplorer;Username=agentyk;Password=${POSTGRES_PASSWORD:-agentyk}
      NBXPLORER_NOAUTH: 1
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:32838/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    volumes:
      - nbxplorer-data:/root/.nbxplorer
    expose:
      - "32838"
    depends_on:
      - bitcoind

  btcpay:
    image: btcpayserver/btcpayserver:2.3.5
    container_name: ash-btcpay
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      BTCPAY_NETWORK: mainnet
      BTCPAY_BIND: 0.0.0.0:49392
      BTCPAY_ROOTPATH: /
      BTCPAY_CHAINS: btc
      BTCPAY_POSTGRES: Host=postgres;Port=5432;Database=btcpay;Username=agentyk;Password=${POSTGRES_PASSWORD:-agentyk}
      BTCPAY_BTCEXPLORERURL: http://nbxplorer:32838/
      BTCPAY_EXPLORERPOSTGRES: Host=postgres;Port=5432;Database=nbxplorer;Username=agentyk;Password=${POSTGRES_PASSWORD:-agentyk}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:49392/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports:
      - "127.0.0.1:49392:49392"
    volumes:
      - btcpay-data:/datadir
    depends_on:
      - nbxplorer
      - postgres

  # === MAIL SERVER ===
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: ash-stalwart
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'my $$s = IO::Socket::INET->new(PeerAddr=>q{localhost},PeerPort=>8080,Timeout=>3) or exit 1; print $$s qq{GET / HTTP/1.0\r\nHost: localhost\r\n\r\n}; my $$r = <$$s>; exit($$r =~ /200/ ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
      - "127.0.0.1:4190:4190"
      - "127.0.0.1:8443:8443"
    volumes:
      - stalwart-data:/opt/stalwart-mail
      - ./docker/stalwart-certs:/opt/stalwart/certs:ro

volumes:
  pgdata:
  bitcoin-data:
  nbxplorer-data:
  btcpay-data:
  transmission-config:
  downloads:
  jackett-config:
  readarr-config:
  stalwart-data:
