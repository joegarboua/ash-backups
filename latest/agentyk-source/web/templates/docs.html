<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentyk — Machine-Readable Docs</title>
<meta name="description" content="Machine-readable JSON API specification for Agentyk email service.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono',Monaco,'Courier New',monospace;background:#000;color:#ccc;padding:2rem 1rem;line-height:1.6;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}
.wrap{max-width:800px;margin:0 auto}
.brand{text-align:center;margin-bottom:2rem}
.logo{font-size:2rem;font-weight:700;color:#fff;letter-spacing:-0.5px}
.tagline{color:#555;font-size:0.85rem;margin-top:0.3rem}
.nav{text-align:center;margin-bottom:2rem;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px}
.nav a{color:#555;text-decoration:none;margin:0 0.8rem;transition:color 0.2s}
.nav a:hover{color:#fff}
.info{text-align:center;color:#555;font-size:0.82rem;margin-bottom:1.5rem}
.info a{color:#fff;text-decoration:none}
.info a:hover{text-decoration:underline}
pre{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:0;padding:1.2rem;overflow-x:auto;font-family:'SF Mono',Monaco,'Courier New',monospace;font-size:0.78rem;color:#999;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.actions{text-align:center;margin:1.5rem 0}
.btn{display:inline-block;padding:10px 24px;background:transparent;color:#ccc;border:1px solid #333;font-family:'SF Mono',Monaco,'Courier New',monospace;font-size:0.82rem;font-weight:500;cursor:pointer;border-radius:0;text-decoration:none;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.btn:hover{border-color:#fff;color:#fff}
</style>
</head>
<body>
<div class="wrap">

<div class="brand">
    <div class="logo">agentyk docs</div>
    <div class="tagline">Machine-Readable API Specification</div>
</div>

<div class="nav">
    <a href="/">Register</a>
    <a href="/login">Login</a>
    <a href="/api">API Reference</a>
    <a href="/help">Help</a>
</div>

<p class="info">This is the same data served at <a href="/.well-known/agent.json">/.well-known/agent.json</a> — formatted for readability.</p>

<div class="actions">
    <a class="btn" href="/.well-known/agent.json">Download agent.json</a>
</div>

<pre id="json-output">Loading...</pre>

</div>
<script>
fetch('/.well-known/agent.json')
    .then(r => r.json())
    .then(data => {
        document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
    })
    .catch(e => {
        document.getElementById('json-output').textContent = 'Error loading: ' + e.message;
    });
</script>
</body>
</html>
